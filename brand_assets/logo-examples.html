<!DOCTYPE html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>True North Exports — Logo Concepts</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,800&family=Outfit:wght@300;400;600;700;800&family=Sora:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0F2440;
  --navy-mid: #1B3A5C;
  --red: #C41E2A;
  --cream: #F5F0E8;
  --gold: #C4A265;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Outfit', sans-serif;
  background: #111;
  color: #fff;
  min-height: 100vh;
}
.page-header {
  text-align: center;
  padding: 60px 20px 20px;
}
.page-header h1 {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.25);
}
.concepts {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px;
  padding: 4px;
  max-width: 1400px;
  margin: 0 auto;
}
.section-title {
  grid-column: 1 / -1;
  text-align: center;
  padding: 40px 20px 8px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.4em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.2);
}
.card {
  padding: 50px 40px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 440px;
  position: relative;
}
.card.white { background: #fff; }
.card.dark { background: var(--navy); }
.card.cream { background: var(--cream); }

.logo { display: flex; flex-direction: column; align-items: center; gap: 16px; }
.emblem { position: relative; width: 180px; height: 180px; }
.emblem svg.globe { position: absolute; inset: 0; width: 100%; height: 100%; }
.leaf {
  position: absolute;
  top: 50%; left: 50%;
  z-index: 10;
  pointer-events: none;
}

@media (max-width: 800px) { .concepts { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div class="page-header"><h1>True North Exports — Logo Concepts</h1></div>
